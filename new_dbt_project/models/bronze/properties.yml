version: 2

models:
  - name: bronze_date
    config:
      materialized: view

  - name: bronze_product
    config:
      materialized: view

  - name: bronze_sales
    columns:
      - name: sales_id
        tests:
          - not_null
          - unique
  - name: gross_amount
    tests:
      - generic_non_negative
          
  - name: bronze_store
    config:
      materialized: view
    columns:
      - name: store_sk
        tests:
          - not_null
          - unique
      - name: store_name
        tests:
          - accepted_values:
              values:
                - 'MegaMart Manhattan'
                - 'MegaMart Brooklyn'
                - 'MegaMart Austin'
                - 'MegaMart San Jose'
                - 'MegaMart Toronto'
              config:
                severity: warn

      - name: country
        tests:
          - accepted_values:
              values:
                - 'USA'
                - 'canada'
              config:
                severity: warn